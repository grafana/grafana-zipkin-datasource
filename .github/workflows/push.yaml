name: Plugins - CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  ci:
    name: CI
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v7.3.1
    permissions:
      contents: read
      id-token: write
    with:
      plugin-version-suffix: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      run-playwright: true

  publish-and-deploy:
    if: github.ref == 'refs/heads/main'
    uses: grafana/data-sources-ci-workflows/.github/workflows/cd-dev.yml@75b9d9544fb63508d7d0e9afec354afd86f94d5b # main
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
    with:
      go-version: "1.25.7"
      golangci-lint-version: "2.10.1"
