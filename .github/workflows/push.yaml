name: Plugins - CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  ci:
    name: CI
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v8.0.1
    permissions:
      contents: read
      id-token: write
    with:
      plugin-version-suffix: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      run-playwright: true

  publish-and-deploy:
    if: github.ref == 'refs/heads/main'
    uses: grafana/data-sources-ci-workflows/.github/workflows/cd-dev.yml@439d34f6c2b178a759327df1ab7182e0ed63ac09 # main
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
    with:
      go-version: "1.26.3"
      golangci-lint-version: "2.11.0"
