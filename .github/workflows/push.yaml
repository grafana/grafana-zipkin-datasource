name: Plugins - CI
permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: CI
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v6.1.1
    with:
      plugin-version-suffix: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      run-playwright: true

  publish-and-deploy:
    if: github.ref == 'refs/heads/main'
    uses: grafana/data-sources-ci-workflows/.github/workflows/cd-dev.yml@main
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
